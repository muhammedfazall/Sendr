version: "3.9"
services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: sendr
      POSTGRES_USER: sendr
      POSTGRES_PASSWORD: secret
    ports:
      - "5433:5432"

  redis:
    image: redis:7-alpine
    command: redis-server --requirepass sendr_redis_secret
    ports:
      - "6379:6379"